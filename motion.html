<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Видео — Кейс</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="project-page">

  <nav class="fixed-nav">
    <div class="nav-content">
      <a href="index.html" class="nav-link">на главную</a>
      <span class="nav-title">проект: моушн</span>
      <hr class="nav-line" />
      <a href="#" class="nav-link"></a>
    </div>
  </nav>

  <main class="project-main motion-main">
    <h1 class="case-header-title">Моушн, видео</h1>

    <section class="motion-row motion-row-pair" aria-label="Лаборатории">
      <div class="motion-video-frame" aria-label="Видео лаборатория зрения">
        <video class="motion-video" src="https://res.cloudinary.com/dn48h6rt6/image/upload/video/лаборатория зрения.mp4" autoplay muted loop playsinline controls></video>
      </div>
      <div class="motion-video-frame" aria-label="Видео лаборатория среды">
        <video class="motion-video" src="https://res.cloudinary.com/dn48h6rt6/image/upload/video/лаборатория среды.mp4" autoplay muted loop playsinline controls></video>
      </div>
    </section>

    <section class="motion-row motion-row-pair" aria-label="Плакаты">
      <div class="motion-video-frame" aria-label="Видео плакат 1">
        <video class="motion-video" src="https://res.cloudinary.com/dn48h6rt6/image/upload/video/плакат1 (1).mp4" autoplay muted loop playsinline controls></video>
      </div>
      <div class="motion-video-frame" aria-label="Видео плакат 2">
        <video class="motion-video" src="https://res.cloudinary.com/dn48h6rt6/image/upload/video/плакат2 (1).mp4" autoplay muted loop playsinline controls></video>
      </div>
    </section>

    <section class="motion-row motion-row-single" aria-label="Nose">
      <div class="motion-video-frame" aria-label="Видео nose">
        <video class="motion-video" src="https://res.cloudinary.com/dn48h6rt6/image/upload/video/nose.mp4" autoplay muted loop playsinline controls></video>
      </div>
    </section>

    <section class="motion-row motion-row-pair" aria-label="Вдохновение">
      <div class="motion-video-frame" aria-label="Видео вдохновение 2">
        <video class="motion-video" src="https://res.cloudinary.com/dn48h6rt6/image/upload/video/вдохновение 2 (1).mp4" autoplay muted loop playsinline controls></video>
      </div>
      <div class="motion-video-frame" aria-label="Видео вдохновение 1">
        <video class="motion-video" src="https://res.cloudinary.com/dn48h6rt6/image/upload/video/вдохновение1 (1).mp4" autoplay muted loop playsinline controls></video>
      </div>
    </section>

    <section class="motion-row motion-row-single" aria-label="Проигрыватель">
      <div class="motion-video-frame motion-video-frame-horizontal" aria-label="Видео проигрыватель">
        <video class="motion-video motion-video-horizontal" src="https://res.cloudinary.com/dn48h6rt6/image/upload/video/проигрыватель.mp4" autoplay muted loop playsinline controls></video>
      </div>
    </section>

    <section class="motion-row motion-row-single" aria-label="Робот анимация">
      <div class="motion-video-frame motion-video-frame-horizontal" aria-label="Видео робот-анимация3в">
        <video class="motion-video motion-video-horizontal" src="https://res.cloudinary.com/dn48h6rt6/image/upload/video/робот-анимация3в.mp4" autoplay muted loop playsinline controls></video>
      </div>
    </section>

    <section class="motion-row motion-row-single" aria-label="Чтецкий вечер">
      <div class="motion-video-frame" aria-label="Видео чтецкий вечер">
        <video class="motion-video" src="https://res.cloudinary.com/dn48h6rt6/image/upload/video/чтецкий вечер.mp4" autoplay muted loop playsinline controls></video>
      </div>
    </section>
  </main>

</body>
</html>
